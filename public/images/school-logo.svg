<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="School logo">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#1a4731"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#f5e6cc" stroke-width="3"/>

  <!-- Open book base -->
  <g transform="translate(100 118)">
    <!-- left page -->
    <path d="M -52 0 Q -52 -6 -46 -6 L -4 -6 Q -2 -6 -2 -4 L -2 36 Q -2 38 -4 38 L -46 38 Q -52 38 -52 32 Z"
          fill="#f5e6cc" stroke="#0f2b1e" stroke-width="2" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M 52 0 Q 52 -6 46 -6 L 4 -6 Q 2 -6 2 -4 L 2 36 Q 2 38 4 38 L 46 38 Q 52 38 52 32 Z"
          fill="#f5e6cc" stroke="#0f2b1e" stroke-width="2" stroke-linejoin="round"/>
    <!-- spine -->
    <line x1="0" y1="-4" x2="0" y2="36" stroke="#0f2b1e" stroke-width="2"/>
    <!-- text lines on left page -->
    <line x1="-44" y1="6"  x2="-10" y2="6"  stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
    <line x1="-44" y1="14" x2="-10" y2="14" stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
    <line x1="-44" y1="22" x2="-18" y2="22" stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
    <!-- text lines on right page -->
    <line x1="10" y1="6"  x2="44" y2="6"  stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="14" x2="44" y2="14" stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="36" y2="22" stroke="#0f2b1e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Graduation cap above the book -->
  <g transform="translate(100 70)">
    <!-- mortarboard (square top) -->
    <polygon points="-44,0 0,-18 44,0 0,18" fill="#f5e6cc" stroke="#0f2b1e" stroke-width="2" stroke-linejoin="round"/>
    <!-- cap base -->
    <path d="M -28 6 L -28 18 Q -28 24 -22 26 Q 0 32 22 26 Q 28 24 28 18 L 28 6 L 0 18 Z"
          fill="#f5e6cc" stroke="#0f2b1e" stroke-width="2" stroke-linejoin="round"/>
    <!-- tassel -->
    <line x1="34" y1="2" x2="40" y2="22" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="24" r="3" fill="#ff6b6b"/>
  </g>
</svg>
